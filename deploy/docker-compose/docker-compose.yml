# Local quickstart only. Not a production deployment.
# Run from this directory: `docker compose up --build`

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ferra
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ferra"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - ferra_pg:/var/lib/postgresql/data

  ferra-server:
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FERRA_DATABASE_URL: postgres://postgres:postgres@postgres:5432/ferra
      FERRA_HTTP_ADDR: 0.0.0.0:8080
      RUST_LOG: ferra_server=info,tower_http=info
    ports:
      - "8080:8080"

volumes:
  ferra_pg:
