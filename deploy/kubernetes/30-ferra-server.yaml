# Ferra server. No app-layer authentication — pods talk to it
# cluster-internal via the ClusterIP Service below. Do NOT expose this
# Service via a public LoadBalancer or Ingress without putting auth in
# front of it.
#
# Three Postgres connection modes are supported via env vars (pick one):
#
#   1. URL mode (this example below):
#        FERRA_DATABASE_URL=postgres://user:pass@host:5432/db
#
#   2. Discrete-fields mode (no URL):
#        FERRA_DATABASE_HOST=db.example.com
#        FERRA_DATABASE_NAME=ferra
#        FERRA_DATABASE_USER=ferra_user
#        FERRA_DATABASE_PASSWORD=...           (use a Secret, not this ConfigMap)
#        FERRA_DATABASE_SSL_MODE=require
#
#   3. AWS RDS / Aurora IAM authentication (no password):
#        FERRA_DATABASE_IAM_AUTH_ENABLED=true
#        FERRA_DATABASE_HOST=<rds-endpoint>
#        FERRA_DATABASE_NAME=ferra
#        FERRA_DATABASE_USER=ferra_iam          (rds_iam role granted in the DB)
#        FERRA_DATABASE_AWS_REGION=us-west-2
#        FERRA_DATABASE_SSL_ROOT_CERT=/etc/rds-ca/global-bundle.pem
#      In IAM mode the SSL mode defaults to verify-full (override with
#      FERRA_DATABASE_SSL_MODE if needed). Mount the AWS RDS CA bundle and
#      point FERRA_DATABASE_SSL_ROOT_CERT at it — see the repo's
#      deploy/kubernetes/README.md for the ConfigMap pattern. AWS
#      credentials come from the standard SDK chain — typically IRSA on
#      EKS. Bind a ServiceAccount with an IAM role that has rds-db:connect
#      permission for the resource arn of the DB user.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ferra-server
  namespace: ferra
data:
  FERRA_HTTP_ADDR: "0.0.0.0:8080"
  FERRA_DATABASE_URL: "postgres://postgres:postgres@ferra-postgres.ferra.svc.cluster.local:5432/ferra"
---
apiVersion: v1
kind: Service
metadata:
  name: ferra-server
  namespace: ferra
spec:
  selector:
    app: ferra-server
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ferra-server
  namespace: ferra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ferra-server
  template:
    metadata:
      labels:
        app: ferra-server
    spec:
      containers:
        - name: ferra-server
          image: ghcr.io/deatherving/ferra:latest  # build/push your own image
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ferra-server
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
